apiVersion: operator.openshift.io/v1alpha1
kind: ExternalSecretsConfig
metadata:
  name: cluster
spec:
  controllerConfig:
    networkPolicies:
    - componentName: ExternalSecretsCoreController
      name: allow-vault-egress
      egress:
      - ports:
        - protocol: TCP
          port: 6443
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5353
        - protocol: UDP
          port: 5353
        - protocol: TCP
          port: 8200
          
      - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault-test
        ports:
        - protocol: TCP
          port: 8200
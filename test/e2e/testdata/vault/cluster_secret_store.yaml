apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-store
  namespace: vault-test
spec:
  provider:
    vault:
      server: http://vault.vault-test.svc.cluster.local:8200
      path: secret/data/test-key
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso-role
          serviceAccountRef:
            name: external-secrets-operator-controller-manager
          secretRef:
            name: test-key
            key: test-key
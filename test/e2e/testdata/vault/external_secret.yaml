apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-example
  namespace: vault-test
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: k8s-secret-to-create
  data:
  - secretKey: password
    remoteRef:
      key: foo
      property: my-value
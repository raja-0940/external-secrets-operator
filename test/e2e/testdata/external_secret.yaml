apiVersion: operator.openshift.io/v1alpha1
kind: ExternalSecretsConfig
metadata:
  labels:
    app.kubernetes.io/name: cluster
    app.kubernetes.io/managed-by: external-secrets-operator-e2e
  name: cluster
spec:
  controllerConfig:
    networkPolicies:
      - name: allow-external-secrets-egress
        componentName: ExternalSecretsCoreController
        egress:
          # Allow egress to Kubernetes API server, AWS endpoints, and DNS
          - to: []
            ports:
            - protocol: TCP
              port: 6443  # Kubernetes API
            - protocol: TCP
              port: 443   # HTTPS (AWS Secrets Manager)
            - protocol: TCP
              port: 5353    # DNS
            - protocol: UDP
              port: 5353    # DNS
      # Vault egress: allows the core controller to reach the vault-test namespace
      # on port 8200. Present at creation time so the operator creates the
      # eso-user-allow-vault-egress NetworkPolicy during its first reconcile,
      # before any Vault-specific test runs.
      - name: allow-vault-egress
        componentName: ExternalSecretsCoreController
        egress:
          - ports:
            - protocol: TCP
              port: 6443
            - protocol: TCP
              port: 443
            - protocol: TCP
              port: 5353
            - protocol: UDP
              port: 5353
          - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: vault-test
            ports:
            - protocol: TCP
              port: 8200
